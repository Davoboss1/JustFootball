<!DOCTYPE html>
<html lang="en">
   <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="">
  <meta name="author" content="">
   	
      <title>Scores Control Panel </title>
      
      <link rel="stylesheet" href="bootstrap_css/bootstrap.min.css" >
      	<link rel="stylesheet" href="bootstrap_css/jcp_style.css">
      		<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.2/css/all.css" integrity="sha384-fnmOCqbTlWIlj8LyTjo7mOUStjsKC4pOpQbqyi7RrhN7udi9RwhKkMHpvLbHG9Sr" crossorigin="anonymous">
      			
<link href="https://fonts.googleapis.com/css?family=Lobster|Raleway:400i" rel="stylesheet">
	<style>
		.scores_display{
			padding-right : 5%;
		}
	</style>
   </head>
   <body>
   	<div class="container">
   		<h4 class="head">Select Teams</h4>
   		
   		
   		<select name="League" style="width:100%;margin-bottom:5%;" >
   <option>Select League</option>
+AKAAoA<option value="home-league" >Home League</option>
+AKAAoA
</select>
   		
   	
        <select name="Team" style="width:100%;" onchange="gethomeValue()">
   <option>Select</option>
+AKAAoA<option value="home-team" id="hometeam" >Home Team</option>
+AKAAoA
</select>
<label class="head" >Enter The Home Team (Optional)</label>
<input type="text" style="width:100%;"  placeholder="Enter Home Team" id="input_home">
        <div class="btn-group" role="group" aria-label="Basic example">
     	
     	<button type="button" class="btn btn-outline-light btn-color" id="home_scores_button" onclick="gethomeScores()">1</button>
  <button type="button" class="btn btn-outline-light btn-color">2</button>
  <button type="button" class="btn btn-outline-light btn-color">3</button>
</div>

<div class="row">
	<div class="col-lg-12 col-md-12 col-sm-12">
		<input type="number" style="width:8%" id="home_input_scores">
		
	</div>
	
</div>


     


<hr style="background-color:#FF5656; height:5px;">

<select name="League" style="width:100%;margin-bottom:5%;" >
   <option>Select Leagues</option>
+AKAAoA<option value="away league" >Away League</option>
+AKAAoA
</select>

<select name="Team" style="width:100%;" onchange="getawayValue()" >
   <option>Select Teams</option>
+AKAAoA<option value="away-team" id="awayteam">Away Team</option>
+AKAAoA
</select>

<label class="head" >Enter The Away Team (Optional) </label>
<input type="text" style="width:100%;"  placeholder="Enter Away Team" id="input_away">
     <div class="btn-group" role="group" aria-label="Basic example">
     	
     	<button type="button" class="btn btn-outline-light btn-color" onclick="getawayScores()" id="away_scores_button">1</button>
  <button type="button" class="btn btn-outline-light btn-color">2</button>
  <button type="button" class="btn btn-outline-light btn-color">3</button>
</div>
<div class="row">
	<div class="col-lg-12 col-md-12 col-sm-12">
		<input type="number" style="width:8%" id="away_input_scores">
		
	</div>
	
</div>

<div class="jumbotron" style="display:flex; ">
	<h6 id="scores_home" class="scores_display" >
		
	</h6>
	<h6 id="scores_home_no" class="scores_display ">
		
	</h6>
	-
			

	<h6 id="scores_away_no" class="scores_display" style="padding-left:5%;">
	</h6>
	
	<h6 id="scores_away" class="scores_display ">
	
		
	</h6>
	
	
</div>
<div>
	<div class="row">
		<div class="col-lg-12 col-md-12 col-sm-12 col-xs-13">
			<input type="submit" class="btn btn-success btn-lg" style="width:100%;">
			
		</div>
		
	</div>
	
	
</div>
      </div>


 <script>
  	/* Set the width of the side navigation to 250px */
  	function gethomeScores(){
		var scores = document.getElementById("home_scores_button").innerHTML;
		var home_scores = document.getElementById("home_input_scores")	.value = scores;
		document.getElementById("scores_home_no").innerHTML = home_scores;
		
 	}
 	function getawayScores(){
 			var scores = document.getElementById("away_scores_button").innerHTML;
		var away_scores = document.getElementById("away_input_scores")	. value = scores;
		
		document.getElementById("scores_away_no").innerHTML = away_scores;
		
		
 	}
function gethomeValue(){
var home_team =	document.getElementById("hometeam").innerHTML;
 var home = document.getElementById("input_home").value = home_team;
 
document.getElementById("scores_home").innerHTML = home;


}
function getawayValue(){
	var away_team = document.getElementById("awayteam").innerHTML;
	var away = document.getElementById("input_away").value = away_team;
	
	
	document.getElementById("scores_away").innerHTML = away;
}

  </script>
  
 <script src="bootstrap_js/jquery-3.3.1.slim.min.js">
</script>
<script src="bootstrap_js/popper.min.js">
</script>
<script src="bootstrap_js/bootstrap.min.js">

</script>

   </body>
</html>
